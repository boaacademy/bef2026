<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOA Academy · BEF 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

:root {
  --teal:#00B4C8; --teal2:#00D4E8; --blue:#003087; --blue2:#004BB5;
  --white:#fff; --bg:#F0F4F8; --card:#fff;
  --border:#E2E8F0; --text:#0F2040; --muted:#64748B;
  --green:#059669; --green-bg:#D1FAE5;
  --red:#DC2626; --red-bg:#FEE2E2;
  --amber:#D97706; --amber-bg:#FEF3C7;
  --purple:#7C3AED; --purple-bg:#EDE9FE;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,48,135,.08),0 1px 2px rgba(0,48,135,.04);
  --shadow-lg:0 10px 40px rgba(0,48,135,.15);
  --font:'Outfit',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --grad:linear-gradient(135deg,#00B4C8 0%,#003087 100%);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body)}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ===== LOADING ===== */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;
  background:var(--grad);position:relative;overflow:hidden}
#loading::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,180,200,.3) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(0,75,181,.4) 0%,transparent 50%);
  animation:pulse-bg 3s ease-in-out infinite alternate}
@keyframes pulse-bg{from{opacity:.6}to{opacity:1}}
.lcard{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);border-radius:24px;
  padding:44px 52px;text-align:center;min-width:300px;
  box-shadow:0 25px 80px rgba(0,0,0,.3);position:relative;z-index:1}
.lcard-logo{height:52px;object-fit:contain;margin-bottom:20px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.lcard-title{font-family:var(--font);font-size:11px;color:rgba(255,255,255,.7);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#lmsg{color:rgba(255,255,255,.7);font-size:13px;font-family:var(--font-body)}

/* ===== LOGIN ===== */
#login-page{min-height:100vh;background:var(--grad);display:flex;
  align-items:center;justify-content:center;padding:20px;
  position:relative;overflow:hidden}
#login-page::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 15% 60%,rgba(0,212,232,.25) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 10%,rgba(0,75,181,.35) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 100%,rgba(0,48,135,.5) 0%,transparent 60%)}
#login-page::after{content:'';position:absolute;width:600px;height:600px;
  border-radius:50%;border:1px solid rgba(255,255,255,.06);
  top:-200px;right:-200px;pointer-events:none}

.login-wrap{display:grid;grid-template-columns:1fr 400px;gap:0;width:100%;
  max-width:900px;border-radius:24px;overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,.4);position:relative;z-index:1}

.login-left{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);border-right:none;
  padding:52px 44px;display:flex;flex-direction:column;justify-content:space-between}
.login-left-logo{height:48px;object-fit:contain;filter:brightness(0) invert(1)}
.login-left-title{font-family:var(--font);font-size:32px;font-weight:800;
  color:#fff;line-height:1.2;margin:auto 0}
.login-left-title span{color:var(--teal)}
.login-left-sub{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}
.login-left-stats{display:flex;gap:24px;margin-top:32px}
.ls{text-align:left}
.ls-val{font-family:var(--font);font-size:28px;font-weight:800;color:#fff}
.ls-lbl{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px}

.login-card{background:#fff;padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.login-card-title{font-family:var(--font);font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px}
.login-card-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.fgroup{margin-bottom:18px}
label{display:block;font-family:var(--font);font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
input,select{width:100%;padding:12px 16px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-family:var(--font-body);font-size:14px;
  color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,180,200,.1)}
.btn-primary{width:100%;padding:14px;background:var(--grad);border:none;
  border-radius:var(--radius-sm);color:#fff;font-family:var(--font);font-size:15px;
  font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;
  letter-spacing:.3px}
.btn-primary:hover{opacity:.92;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.login-error{background:var(--red-bg);color:var(--red);padding:11px 14px;
  border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none;
  border-left:3px solid var(--red)}

/* ===== APP SHELL ===== */
#app-shell{display:flex;height:100vh;overflow:hidden}

.sidebar{width:256px;background:var(--blue);display:flex;flex-direction:column;
  flex-shrink:0;overflow-y:auto;position:relative}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:200px;
  background:radial-gradient(ellipse at 0% 0%,rgba(0,180,200,.2) 0%,transparent 70%);
  pointer-events:none}

.sb-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{height:36px;object-fit:contain;filter:brightness(0) invert(1);
  display:block;margin-bottom:0}
.sb-tagline{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;
  text-transform:uppercase;margin-top:6px}

.sb-user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-avatar{width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-weight:700;color:#fff;font-size:14px;
  margin-bottom:10px;border:2px solid rgba(255,255,255,.15)}
.sb-user-name{color:#fff;font-family:var(--font);font-size:13px;font-weight:700;line-height:1.3}
.sb-user-role{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.sb-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;
  font-weight:700;margin-top:7px;background:rgba(0,180,200,.25);
  color:rgba(255,255,255,.9);font-family:var(--font);letter-spacing:.5px}

.sb-nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;
  color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s;border-left:3px solid transparent;position:relative}
.nav-item svg{opacity:.7;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item:hover svg{opacity:1}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;
  border-left-color:var(--teal)}
.nav-item.active svg{opacity:1}

.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{background:none;border:none;color:rgba(255,255,255,.45);
  font-family:var(--font-body);font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:color .15s}
.btn-logout:hover{color:rgba(255,255,255,.8)}

/* ===== MAIN ===== */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-header{background:#fff;border-bottom:1px solid var(--border);
  padding:18px 28px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0}
.main-title{font-family:var(--font);font-size:20px;font-weight:800;color:var(--text)}
.main-sub{font-size:12px;color:var(--muted);margin-top:2px}
.main-body{flex:1;padding:22px 28px}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--radius);padding:18px 16px;
  box-shadow:var(--shadow);border-top:3px solid transparent;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card.teal{border-top-color:var(--teal)}
.stat-card.green{border-top-color:var(--green)}
.stat-card.red{border-top-color:var(--red)}
.stat-card.amber{border-top-color:var(--amber)}
.stat-card.purple{border-top-color:var(--purple)}
.stat-lbl{font-family:var(--font);font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-family:var(--font);font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-card.teal .stat-val{color:var(--teal)}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.red .stat-val{color:var(--red)}
.stat-card.amber .stat-val{color:var(--amber)}
.stat-card.purple .stat-val{color:var(--purple)}

/* ===== FILTERS ===== */
.filters-bar{background:#fff;border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow);margin-bottom:14px;display:flex;gap:8px;
  flex-wrap:wrap;align-items:center}
.fi{padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-family:var(--font-body);font-size:13px;outline:none;color:var(--text);background:#fff;
  transition:border-color .2s}
.fi:focus{border-color:var(--teal)}
.fi-search{flex:1;min-width:200px}

/* ===== BULK BAR ===== */
.bulk-bar{background:var(--grad);border-radius:var(--radius);padding:11px 18px;
  margin-bottom:12px;display:none;align-items:center;justify-content:space-between}
.bulk-bar.show{display:flex}
.bulk-text{color:#fff;font-family:var(--font);font-size:13px;font-weight:700}
.btn-bulk-ok{padding:7px 16px;background:#fff;color:var(--blue);border:none;
  border-radius:6px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.btn-bulk-clr{padding:7px 14px;background:rgba(255,255,255,.2);color:#fff;border:none;
  border-radius:6px;font-family:var(--font-body);font-size:13px;cursor:pointer;margin-left:8px}

/* ===== TABLE ===== */
.table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#F8FAFC;padding:10px 14px;text-align:left;font-family:var(--font);
  font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:0.5px solid #F1F5F9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFF}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-family:var(--font);font-size:11px;font-weight:700}
.b-oui{background:var(--green-bg);color:var(--green)}
.b-non{background:var(--red-bg);color:var(--red)}
.b-auto{background:#DBEAFE;color:#1E40AF}
.b-pend{background:var(--amber-bg);color:var(--amber)}
.b-req{background:var(--purple-bg);color:var(--purple)}
.b-rpl{padding:3px 8px;border-radius:5px;font-family:var(--font);font-size:11px;font-weight:700}

/* ===== ACTION BUTTONS ===== */
.btn-a{padding:5px 10px;border:none;border-radius:5px;font-family:var(--font);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-a:hover{opacity:.8;transform:translateY(-1px)}
.btn-a-oui{background:var(--green-bg);color:var(--green)}
.btn-a-non{background:var(--red-bg);color:var(--red)}
.btn-a-req{background:var(--purple-bg);color:var(--purple)}
.btn-a-mod{background:#DBEAFE;color:#1E40AF}
.btn-a-parc{background:#D1FAE5;color:#065F46}

/* ===== PAGINATION ===== */
.pagination{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-top:1px solid var(--border)}
.pag-info{font-size:12px;color:var(--muted)}
.pag-btns{display:flex;gap:4px}
.btn-pg{padding:5px 12px;border:1.5px solid var(--border);border-radius:6px;
  background:#fff;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
.btn-pg:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.btn-pg:disabled{opacity:.35;cursor:not-allowed}
.btn-pg.cur{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ===== MODAL ===== */
.modal-ov{position:fixed;inset:0;background:rgba(0,48,135,.25);
  display:flex;align-items:center;justify-content:center;z-index:999;
  backdrop-filter:blur(6px)}
.modal-card{background:#fff;border-radius:20px;padding:32px;width:100%;
  max-width:460px;box-shadow:0 30px 80px rgba(0,48,135,.25);max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font);font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px}
.modal-info{background:#F8FAFC;border-radius:var(--radius-sm);padding:12px 16px;
  margin-bottom:20px;font-size:13px;line-height:1.7;border-left:3px solid var(--teal)}
.modal-info strong{display:block;font-family:var(--font);color:var(--muted);
  font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.radio-item{display:flex;align-items:center;gap:12px;padding:11px 16px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;transition:border-color .2s}
.radio-item:hover{border-color:var(--teal)}
.radio-item input{accent-color:var(--teal);width:16px;height:16px;flex-shrink:0}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:#fff;font-family:var(--font-body);font-size:13px;cursor:pointer;color:var(--muted)}
.btn-confirm{padding:10px 20px;background:var(--grad);border:none;
  border-radius:var(--radius-sm);color:#fff;font-family:var(--font);
  font-size:13px;font-weight:700;cursor:pointer}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}

/* ===== PROGRESS ===== */
.prog-wrap{background:#E2E8F0;border-radius:4px;height:6px;overflow:hidden}
.prog-bar{height:100%;background:var(--grad);border-radius:4px;transition:width .5s}

/* ===== RPL GRID (ADMIN) ===== */
.rpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:22px}
.rpl-card{background:#fff;border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);border-left:4px solid var(--teal);transition:transform .2s,box-shadow .2s}
.rpl-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.rpl-name{font-family:var(--font);font-size:14px;font-weight:700;color:var(--text)}
.rpl-code{font-size:11px;color:var(--muted);margin-top:2px}
.rpl-stats{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.rms{flex:1;text-align:center}
.rms-val{font-family:var(--font);font-size:20px;font-weight:800}
.rms-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}

/* ===== EXPORT ===== */

.tab-bar{display:flex;gap:2px;margin-bottom:14px;background:var(--border);border-radius:var(--radius);padding:3px}
.tab-btn{flex:1;padding:8px 16px;border:none;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:#fff;color:var(--blue);box-shadow:var(--shadow)}
.tab-btn .tab-count{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;margin-left:6px;background:var(--bg);color:var(--muted)}
.tab-btn.active .tab-count{background:var(--blue);color:#fff}
.sugg-btn{background:none;border:1px dashed var(--border);border-radius:5px;padding:3px 8px;font-size:10px;color:var(--muted);cursor:pointer;transition:all .2s}
.sugg-btn:hover{border-color:var(--teal);color:var(--teal)}
.sugg-list{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:4px;box-shadow:var(--shadow)}
.sugg-item{font-size:11px;padding:3px 0;color:var(--text);border-bottom:0.5px solid var(--border)}
.sugg-item:last-child{border-bottom:none}

.btn-export{padding:11px 22px;background:var(--grad);border:none;border-radius:var(--radius-sm);
  color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;transition:opacity .2s,transform .1s}
.btn-export:hover{opacity:.9;transform:translateY(-1px)}

/* ===== MISC ===== */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:14px}
.from-badge{background:var(--amber-bg);color:var(--amber);padding:2px 7px;
  border-radius:4px;font-size:10px;font-weight:700;margin-left:4px;font-family:var(--font)}
</style>
</head>

async function decompress(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');
  const wr=ds.writable.getWriter();wr.write(bytes);wr.close();
  const rd=ds.readable.getReader(),chunks=[];
  while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value);}
  const tot=chunks.reduce((a,c)=>a+c.length,0),res=new Uint8Array(tot);
  let off=0;for(const c of chunks){res.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(res));
}

async function loadData(){
  document.getElementById('lmsg').textContent='Décompression des données...';
  DATA=await decompress(B64);
}

async function loadDecs(){
  document.getElementById('lmsg').textContent='Chargement des décisions...';
  try{
    const {data,error}=await _supa.from('decisions').select('*');
    if(error)throw error;
    DECS={};
    data.forEach(r=>{
      DECS[r.id]={
        status:r.status,
        motif:r.motif,
        requalTo:r.requal_to,
        requalFrom:r.requal_from,
        byRPL:r.by_rpl,
        auto:r.auto,
        date:r.date_decision,
        label:r.label||null,
        parcours:r.label?r.label.replace('OUI - Parcours complet (','').replace(')',''):null
      };
    });
  }catch(e){
    console.error('Supabase loadDecs error:',e);
    // Fallback to localStorage
    try{const r=localStorage.getItem(DK);if(r)DECS=JSON.parse(r);}catch(e2){}
  }
}

async function saveDecs(){
  // Local backup
  try{localStorage.setItem(DK,JSON.stringify(DECS));}catch(e){}
}

async function saveDecision(id){
  const d=DECS[id];
  if(!d)return;
  try{
    await _supa.from('decisions').upsert({
      id:id,
      status:d.status,
      motif:d.motif||null,
      requal_to:d.requalTo||null,
      requal_from:d.requalFrom||null,
      by_rpl:d.byRPL||null,
      auto:d.auto||false,
      date_decision:d.date||null,
      label:d.label||null
    },{onConflict:'id'}).catch(e=>console.warn('Save warning:',e));
  }catch(e){console.error('Supabase save error:',e);}
}

async function saveDecisions(ids){
  const rows=ids.map(id=>{
    const d=DECS[id];
    return{id,status:d.status,motif:d.motif||null,requal_to:d.requalTo||null,
      requal_from:d.requalFrom||null,by_rpl:d.byRPL||null,auto:d.auto||false,date_decision:d.date||null};
  });
  try{
    await _supa.from('decisions').upsert(rows,{onConflict:'id'});
  }catch(e){console.error('Supabase batch save error:',e);}
}

async function applyAutoOUI(){
  const ids=[];
  DATA.forEach(r=>{
    if(AUTO_TYPES.includes(r.type)&&!DECS[r.id]&&!r.auto_non){
      DECS[r.id]={status:'OUI',auto:true,date:today()};ids.push(r.id);
    }
  });
  if(ids.length){saveDecs();await saveDecisions(ids);}
}

function today(){return new Date().toLocaleDateString('fr-FR');}

async function init(){
  try{
    _supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  }catch(e){
    document.getElementById('lmsg').textContent='Erreur Supabase: '+e.message;
    return;
  }
  try{
    await loadData();
  }catch(e){
    document.getElementById('lmsg').textContent='Erreur chargement données: '+e.message;
    return;
  }
  try{
    await loadDecs();
  }catch(e){
    console.error('Erreur loadDecs:',e);
  }
  try{
    await applyAutoOUI();
  }catch(e){
    console.error('Erreur applyAutoOUI:',e);
  }
  document.getElementById('app').innerHTML='';
  renderLogin();
}

// ===== FILTERED RECORDS =====
function getMyRecords(tab){
  const t=tab||curTab;
  let recs;
  if(isAdmin){
    recs=DATA;
  } else {
    recs=DATA.filter(r=>{
      if(r.rpl===curRPL)return true;
      const d=DECS[r.id];
      if(d&&d.status==='REQUALIFIE'&&d.requalTo===curRPL)return true;
      return false;
    });
  }
  return recs.filter(r=>r.source===t);
}

function getFiltered(){
  let recs=getMyRecords(curTab);
  const q=F.q.toLowerCase();
  if(q)recs=recs.filter(r=>
    r.racine.toLowerCase().includes(q)||
    r.fonction.toLowerCase().includes(q)||
    r.entite.toLowerCase().includes(q)||
    r.theme.toLowerCase().includes(q)
  );
  if(F.type)recs=recs.filter(r=>r.type===F.type);
  if(F.poste)recs=recs.filter(r=>r.fonction===F.poste);
  if(F.theme)recs=recs.filter(r=>r.theme===F.theme);
  if(F.status!=='all'){
    recs=recs.filter(r=>{
      const d=DECS[r.id];
      const s=d?d.status:'PENDING';
      if(F.status==='PENDING')return s==='PENDING';
      return s===F.status;
    });
  }
  if(isAdmin&&F.rpl)recs=recs.filter(r=>r.rpl===F.rpl);
  return recs;
}

function getStats(recs){
  const tot=recs.length,stats={OUI:0,NON:0,REQUALIFIE:0,AUTO:0,PENDING:0};
  recs.forEach(r=>{
    const d=DECS[r.id];
    if(!d){stats.PENDING++;return;}
    if(d.auto)stats.AUTO++;
    stats[d.status]=(stats[d.status]||0)+1;
    if(d.status==='PENDING')stats.PENDING++;
  });
  return{tot,...stats};
}

async function quickOUI(id,mode){
  const d=DECS[id];
  if(d&&d.auto)return;
  const r=DATA.find(x=>x.id===id);
  let label='OUI';
  if(mode==='module')label='OUI - Module demandé';
  if(mode==='parcours')label='OUI - Parcours complet '+(r&&r.parcours_name?'('+r.parcours_name+')':'');
  DECS[id]={status:'OUI',label,date:today(),byRPL:curRPL||'admin'};
  saveDecs();
  await saveDecision(id);
  renderMain();
}

function toggleSel(id,cb){if(cb.checked)sel.add(id);else sel.delete(id);renderMain();}

function toggleAll(cb,ids){
  ids.forEach(id=>{const d=DECS[id];if(!d||!d.auto){if(cb.checked)sel.add(id);else sel.delete(id);}});
  renderMain();
}

async function bulkValidate(){
  const ids=[];
  sel.forEach(id=>{
    const d=DECS[id];
    if(!d||!d.auto){DECS[id]={status:'OUI',date:today(),byRPL:curRPL||'admin'};ids.push(id);}
  });
  saveDecs();
  await saveDecisions(ids);
  sel=new Set();renderMain();
}

function renderProgressView(m){

// ===== EXPORT XLSX =====
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  const today2=today();

  // ===== ONGLET 1 - SUR CATALOGUE =====
  const sc_data=DATA.filter(r=>r.source==='SC');
  const rows_sc=[['Racine','Fonction','Entité','Thématique','Type','QFL','Nb modules','RPL','Décision','Parcours/Module validé','Motif refus','Requalifié vers','Date']];
  sc_data.forEach(r=>{
    const d=DECS[r.id]||{};
    const dec=r.auto_oui?'OUI (Auto)':d.status||'En attente';
    const detail=d.label||'';
    rows_sc.push([r.racine,r.fonction,r.entite,r.theme,r.type,r.qfl||'',r.nb_modules,r.rpl,dec,detail,d.motif||'',d.requalTo||'',d.date||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows_sc),'Sur Catalogue');

  // ===== ONGLET 2 - HORS CATALOGUE =====
  const hc_data=DATA.filter(r=>r.source==='HC');
  const rows_hc=[['Racine','Fonction','Entité','Besoin original','Intitulé qualifié','QFL','Nb modules','Cours suggérés','RPL','Décision','Motif refus','Requalifié vers','Date']];
  hc_data.forEach(r=>{
    const d=DECS[r.id]||{};
    const dec=r.auto_non?'NON (Auto)':d.status||'En attente';
    const motif=r.auto_non?'Non alignée au périmètre des fonctions actuelles':d.motif||'';
    rows_hc.push([r.racine,r.fonction,r.entite,r.besoin_original||'',r.theme,r.qfl||'',r.nb_modules,(r.suggs||[]).join(' | '),r.rpl,dec,motif,d.requalTo||'',d.date||'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows_hc),'Hors Catalogue');

  // ===== ONGLET 3 - PARCOURS PAR COLLABORATEUR =====
  const byRacine={};
  DATA.forEach(r=>{
    if(!byRacine[r.racine])byRacine[r.racine]={racine:r.racine,fonction:r.fonction,entite:r.entite,total:0,oui:[],non:[],pend:[]};
    const b=byRacine[r.racine]; b.total++;
    const d=DECS[r.id]; const s=r.auto_oui?'OUI':r.auto_non?'NON':d?d.status:'PENDING';
    if(s==='OUI')b.oui.push((r.source==='HC'?'[HC] ':'')+r.theme);
    else if(s==='NON')b.non.push(r.theme);
    else b.pend.push(r.theme);
  });
  const rows3=[['Racine','Fonction','Entité','Nb demandes','Nb validées','Nb refusées','En attente','Taux validation','Formations validées']];
  Object.values(byRacine).forEach(b=>{
    const pct=b.total?Math.round(b.oui.length/b.total*100)+'%':'0%';
    rows3.push([b.racine,b.fonction,b.entite,b.total,b.oui.length,b.non.length,b.pend.length,pct,b.oui.join(' | ')]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows3),'Parcours collaborateurs');

  // ===== ONGLET 4 - AVANCEMENT PAR RPL =====
  const rows4=[['RPL','Responsable','SC Total','SC OUI','SC NON','SC Attente','HC Total','HC OUI','HC NON','HC Attente','% Global']];
  Object.keys(RPL_CONFIG).forEach(rpl=>{
    const sc=DATA.filter(r=>r.rpl===rpl&&r.source==='SC');
    const hc=DATA.filter(r=>r.rpl===rpl&&r.source==='HC');
    const count=(arr,s)=>arr.filter(r=>{const d=DECS[r.id];const st=r.auto_oui?'OUI':r.auto_non?'NON':d?d.status:'PENDING';return st===s;}).length;
    const scO=count(sc,'OUI'),scN=count(sc,'NON'),scP=sc.length-scO-scN;
    const hcO=count(hc,'OUI'),hcN=count(hc,'NON'),hcP=hc.length-hcO-hcN;
    const tot=sc.length+hc.length;
    const done=scO+scN+hcO+hcN;
    const pct=tot?Math.round(done/tot*100)+'%':'0%';
    rows4.push([rpl,RPL_CONFIG[rpl].name,sc.length,scO,scN,scP,hc.length,hcO,hcN,hcP,pct]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows4),'Avancement RPL');

  XLSX.writeFile(wb,`BEF_2026_Export_${today2.replace(/\//g,'-')}.xlsx`);
}
